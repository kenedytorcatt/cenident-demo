<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Acceso privado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root, :root *, :root *::before, :root *::after { font-style: normal !important; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; height: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 20% 20%, rgba(59,108,255,.18), transparent 60%),
      radial-gradient(800px 500px at 80% 80%, rgba(139,92,246,.12), transparent 60%),
      #0a0a0a;
    color: #fafafa;
    display: grid; place-items: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 440px;
    background: rgba(15,15,16,.92);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px;
    padding: 36px 32px 30px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03);
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #1f4fff, #3b6cff);
    color: #fff; font-weight: 600; font-size: 15px;
    display: grid; place-items: center;
    box-shadow: 0 0 0 1px rgba(59,108,255,.30), 0 8px 20px -6px #3b6cff;
  }
  .brand-name { font-size: 16px; font-weight: 600; letter-spacing: -.01em; }
  .brand-sub { font-size: 11px; color: #6e6e74; font-family: 'Geist Mono', monospace; letter-spacing: .14em; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 11px; background: rgba(59,108,255,.10);
    border: 1px solid rgba(59,108,255,.24);
    border-radius: 999px; font-size: 10.5px; font-weight: 600;
    letter-spacing: .14em; text-transform: uppercase;
    color: #7c8cff;
    margin-bottom: 16px;
  }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 999px; background: #7c8cff; box-shadow: 0 0 8px #7c8cff; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -.02em; line-height: 1.2; margin-bottom: 10px; }
  .sub { font-size: 13.5px; color: #a3a3a8; line-height: 1.55; margin-bottom: 24px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11.5px; color: #a3a3a8; margin-bottom: 7px; font-weight: 500; letter-spacing: .04em; }
  .field input {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 10px;
    font-size: 14.5px; color: #fff;
    outline: none; font-family: inherit;
    letter-spacing: .04em;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus {
    border-color: #3b6cff;
    box-shadow: 0 0 0 4px rgba(59,108,255,.18);
  }
  .field input::placeholder { color: #6e6e74; letter-spacing: .12em; }
  .err {
    font-size: 12px; color: #f87171;
    margin-bottom: 12px; min-height: 18px;
    transition: opacity .2s;
    opacity: 0;
  }
  .err.show { opacity: 1; }
  .btn {
    width: 100%; padding: 12px 18px;
    background: linear-gradient(180deg, #1f4fff, #3b6cff);
    color: #fff; border: 1px solid rgba(59,108,255,.5);
    border-radius: 10px; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 8px 24px -10px rgba(59,108,255,.5);
    transition: filter .15s, box-shadow .25s;
  }
  .btn:hover { filter: brightness(1.10); box-shadow: 0 0 0 4px rgba(59,108,255,.18), 0 12px 30px -10px #3b6cff; }
  .foot {
    margin-top: 22px; padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,.06);
    font-size: 11.5px; color: #6e6e74; line-height: 1.6;
  }
  .foot b { color: #a3a3a8; font-weight: 500; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark">C</div>
      <div>
        <div class="brand-name">Cenident</div>
        <div class="brand-sub">DEMO · PRIVADO</div>
      </div>
    </div>

    <div class="eyebrow"><span class="dot"></span>Acceso restringido</div>
    <h1>Demo de revisión</h1>
    <p class="sub">Este demo es de uso exclusivo para revisión del producto. Ingresa la clave que te enviaron por WhatsApp.</p>

    <form onsubmit="checkPass(event)" autocomplete="off">
      <div class="field">
        <label>Clave de acceso</label>
        <input id="pw" type="password" placeholder="••••••••" autofocus autocomplete="off"/>
      </div>
      <div class="err" id="err">Clave incorrecta</div>
      <button class="btn" type="submit">Entrar al demo →</button>
    </form>

    <div class="foot">
      ¿No tienes la clave? Contacta al equipo Cenident por WhatsApp.
      <br/><b style="margin-top:6px; display:inline-block">Este sitio no se indexa en buscadores.</b>
    </div>
  </div>

<script>
  // Auto-redirect si ya tiene sesión válida
  // Cache-buster: cambiar BUILD_ID en cada deploy para forzar URL nueva (esquiva cache CDN)
  const BUILD_ID = 'v13-' + Date.now();
  if (sessionStorage.getItem('cdAccess') === 'ok') {
    location.replace('./app.html?b=' + BUILD_ID);
  }

  // SHA-256 de la clave correcta (se genera con: echo -n "tuClave" | sha256sum)
  // Clave actual: cenident2026
  const HASH = 'e6e6f8e8f5f5a1c2d3e4b5a6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function checkPass(e) {
    e.preventDefault();
    const pw = document.getElementById('pw').value.trim();
    const err = document.getElementById('err');
    const h = await sha256(pw);
    // Por ahora aceptamos también la clave en texto plano (simple para socio)
    // Cambiar a comparar hash cuando esté listo: if (h === HASH)
    if (pw === 'cenident2026') {
      sessionStorage.setItem('cdAccess', 'ok');
      err.classList.remove('show');
      location.replace('./app.html?b=' + BUILD_ID);
    } else {
      err.classList.add('show');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
</script>

</body>
</html>
